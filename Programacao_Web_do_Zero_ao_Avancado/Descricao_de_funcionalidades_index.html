CONHECENDO AS TAGS:
______________________

Tags de cabeçalho: são representadas por <h> de head, e vão de <h1> até <h6>, são titulos que são organizados do mais relevante ao menos importante.
exemplo:

<h1>Titulo 1</h1>
<h2>Titulo 2</h2>
<h3>Titulo 3</h3>
<h4>Titulo 4</h4>
<h5>Titulo 5</h5>
<h6>Titulo 6</h6>

OBS: Titulos não devem ser usados pra aumentar o tamanho da letra, eles só são usados pra mostrar a importância do texto

Tag paragráfo: representa-se por <p>texto</p> e é usada pra por um texto na pagina, e as tags do tipo paragráfos ficam dentro das tags de cabeçalhos, assim:
<h1>Estudando html</h1>
<p>"Bem-vindo ao meu espaço gamer! Aqui você encontra gameplays cheios de energia, explorando diferentes mundos virtuais com diversão, estratégia e emoção. Além das partidas, trago também momentos musicais especiais: aquelas trilhas sonoras que embalam os jogos e fazem parte da experiência única de jogar.

O canal é feito para quem ama acompanhar jogadas, descobrir novos títulos e sentir a vibe das músicas que tornam cada gameplay inesquecível. Se você curte games e quer mergulhar nesse universo com jogadas autênticas e sons marcantes, este é o lugar certo!"</p>

FORMATAÇÃO DE TEXTO:
____________________

Tag <b>texto</b> : torna o texto em negrito
<p>texto <b>texto</b> texto</p>

Tag <strong>texto</strong>: também deixa em negrito, mas é pra dar enfase na frase ou palavra
serve mais pra destacar um texto.

Tag hr: serve pra colocar uma linha pra separar textos
exemplo:
<p>Texto</p>
<hr>
<p>Texto</p>

resultado:
Texto
___________________
Texto
___________________

Tag br: serve pra fazer um texto pular uma linha
<br> Texto

Tag <mark></mark>: serve pra pintar o texto

Tag <i></i>: serve para colocar um texto em italico

Tag <u></u>: Serve para sublinhar o texto

Tag <small></small>: serve para colocar um texto em um tamanho menor que as normias

Tag <del></del>: serve pra colocar um traço no meio do texto, como se fosse riscado bem no meio

Tag <strike></strike>: faz o mesmo que o del faz, só que é mais antigo e já está a ser pouco usado, pois os navegadores vão parar de interpretar essa tag

Tag <sup></sup>: É usada para colocar exponecial a um numero.
exemplo 210:
2<sup>10</sup>
saída 2^10

Tag <sub></sub>: Faz o contrario que o sup,m pois o 10 ficará em baixo, ao invés de estar em cima

Atenão: as tags <sup></sup> e <sub></sub> não servem só pra números, mas também para textos

    ELEMENTOS DE CITAÇÃO
_____________________________

Tag <abbr></abber>: serve pra abreviar um texto.
    Se colocares (<abbr title="Coloque um comentario qualquer sobre o texto"></abbr) Coloca um comentario qualquer sobre o texto

Tag <address></address>: serve pra colocar um endereço (Email, Morada, etc..)

Tag <cite></cite>: É usada pra dar titulos de obras (filems, poemas, series, etc...)
Exemplo:
        <cite>Avengers</cite>

Tag <q></q>: serve pra por o texto em virgulas altas
Exemplo:
        <q>A aula está aborrecida</q>
        saída : "A aula está aborrecida"

Tag <blockquote></blockquote>: serve pra dar uma citação com o objectivo de comentar o que já está escrito

Tag <bdo dir"ltr or rtl or auto"></bdo>: serve pra inverter o texto. (Left to Right or Right to left)

Tag comentario (Ver o inicio e fim deste arquivo) : é usada pra explicar uma linha de codigo ou marcar uma referencia no codigo: Ctrl + K + C comenta as linhas selecionadas / Ctrl + K + U descomenta as linhas selecionadas

    LINKS ABSOLUTOS E RELATIVOS
__________________________________

Tag <a></a>: serve pra colocar um link na pagina
exemplo:
<a href="Caminho ou link"></a> na pratica veja o arquivo (Links_index.html) da pasta (Programacao_Web_do_Zero_ao_Avançado), se quiseres que ele abra numa outra janela, coloque assim: <a href="https://google.com" target="_blank"></a>

Para que abra link absoluto: <a href="https://google.com" target="_blank"></a>
Para que abra link relativo: <a href="nome de um arquivo html" target="_blank"></a>
Se estiver em pasta diferente usa-se: <a href="nome da pasta/nome do arquivo html" target="_blank"></a>

OBS: Só podes voltar pra uma pagina de um dos arquivos caso estiverem na mesma pasta!
pra tal, tem que se escrever : <a href="../nome do arquivo html" target="_blank"></a>
Os (..) indicam que voltou 1 pasta pra aceder a um arquivo pelo link establecido
Exemplo: <a href="../Exemplo_usado_no_arquivo_Links_index.html" target="_blank"></a>
(../../../) caso o arquivo html esteja várias pastas atrás.
